<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestamos App — Dashboard Financiero</title>
    <meta name="description" content="Sistema de gestión de préstamos y seguimiento financiero">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">
                        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                            <circle cx="24" cy="24" r="22" stroke="url(#g1)" stroke-width="3"/>
                            <path d="M16 24L22 30L32 18" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                            <defs><linearGradient id="g1" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient></defs>
                        </svg>
                    </div>
                    <h1>Prestamos App</h1>
                    <p>Sistema de Gestión Financiera</p>
                </div>
                <div id="login-form">
                    <div class="form-group">
                        <label for="login-username">Usuario</label>
                        <input type="text" id="login-username" placeholder="Ingrese su usuario" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" placeholder="Ingrese su contraseña" autocomplete="current-password">
                    </div>
                    <button type="button" class="btn btn-primary btn-full" id="login-btn">
                        <span>Iniciar Sesión</span>
                    </button>
                    <div id="login-error" class="alert alert-error" style="display:none;"></div>
                </div>
                <div id="register-section" style="margin-top:1rem;text-align:center;">
                    <p style="color:var(--text-muted);font-size:0.85rem;">¿Primera vez? <a href="#" id="show-register" style="color:var(--primary);">Crear cuenta</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Crear Cuenta</h2>
                <button class="modal-close" onclick="closeModal('register-modal')">&times;</button>
            </div>
            <div id="register-form">
                <div class="form-group">
                    <label for="reg-fullname">Nombre Completo</label>
                    <input type="text" id="reg-fullname" placeholder="Tu nombre completo">
                </div>
                <div class="form-group">
                    <label for="reg-username">Usuario</label>
                    <input type="text" id="reg-username" placeholder="Nombre de usuario" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 4 caracteres" autocomplete="new-password">
                </div>
                <button type="button" class="btn btn-primary btn-full" id="register-btn">Registrarse</button>
                <div id="register-error" class="alert alert-error" style="display:none;"></div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app-layout" style="display:none;">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="22" stroke="url(#g2)" stroke-width="3"/>
                        <path d="M16 24L22 30L32 18" stroke="url(#g2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs><linearGradient id="g2" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient></defs>
                    </svg>
                    <span class="sidebar-title">Prestamos</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-view="dashboard" id="nav-dashboard">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="3" y="13" width="7" height="4" rx="1"/><rect x="13" y="3" width="4" height="14" rx="1"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-view="clients" id="nav-clients">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 18v-1a4 4 0 00-4-4H7a4 4 0 00-4 4v1"/><circle cx="10" cy="7" r="4"/></svg>
                    <span>Clientes</span>
                </a>
                <a href="#" class="nav-item" data-view="loans" id="nav-loans">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="16" height="12" rx="2"/><path d="M2 10h16"/></svg>
                    <span>Préstamos</span>
                </a>
                <a href="#" class="nav-item" data-view="simulator" id="nav-simulator">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="12" height="16" rx="1"/><path d="M8 12h4M8 15h4M8 9h4"/></svg>
                    <span>Simulador</span>
                </a>
                <a href="#" class="nav-item" data-view="payments" id="nav-payments">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v6l3-3M12 8l-3-3"/><rect x="3" y="10" width="14" height="7" rx="1"/></svg>
                    <span>Pagos</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div class="user-details">
                        <span class="user-name" id="user-name">Admin</span>
                        <span class="user-role">Administrador</span>
                    </div>
                </div>
                <button class="btn-icon" id="logout-btn" title="Cerrar sesión">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 16H4a1 1 0 01-1-1V3a1 1 0 011-1h5M13 12l4-4-4-4M7 9h10"/></svg>
                </button>
            </div>
        </aside>

        <!-- Mobile Header -->
        <header class="mobile-header" id="mobile-header">
            <button class="hamburger" id="hamburger-btn">
                <span></span><span></span><span></span>
            </button>
            <span class="mobile-title">Prestamos App</span>
            <button class="btn-icon" id="mobile-logout-btn" title="Cerrar sesión">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 16H4a1 1 0 01-1-1V3a1 1 0 011-1h5M13 12l4-4-4-4M7 9h10"/></svg>
            </button>
        </header>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <!-- Dynamic content loaded here -->
        </main>
    </div>

    <!-- Generic Modal Container -->
    <div id="generic-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content" id="generic-modal-content"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/static/js/api.js?v=4"></script>
    <script src="/static/js/dashboard.js?v=3"></script>
    <script src="/static/js/clients.js?v=3"></script>
    <script src="/static/js/loans.js?v=3"></script>
    <script src="/static/js/payments.js?v=4"></script>
    <script src="/static/js/app.js?v=3"></script>
</body>
</html>
